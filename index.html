<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>张志凌 Zhiling Zhang</title>
  <meta name="description" content="张志凌 Zhiling Zhang">
  <style>
    :root {
      --bg: #121716;
      --text: #d8d4cc;
      --muted: #b5afa6;
      --line: #5c5952;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 24px/1.65 Georgia, "Times New Roman", "Noto Serif SC", serif;
    }
    main {
      width: min(570px, calc(100% - 48px));
      margin: 0 auto;
      padding: 84px 0 70px;
    }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 4.5rem);
      line-height: 1.15;
      font-weight: 400;
      letter-spacing: 0;
    }
    .en {
      margin: 4px 0 32px;
      color: var(--muted);
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: 0;
    }
    .links {
      display: flex;
      gap: 40px;
      margin: 0 0 34px;
      font: 26px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a {
      color: var(--muted);
      text-decoration: none;
    }
    a:hover { color: var(--text); }
    .affiliation {
      display: inline-block;
      margin: 0 0 70px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font: 26px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .agent {
      width: fit-content;
      margin: 0 auto;
      color: var(--muted);
      text-align: center;
    }
    .agent small {
      display: block;
      margin-bottom: -6px;
      font-size: 12px;
      letter-spacing: 0;
    }
    .agent a {
      display: inline-block;
      border-bottom: 1px solid var(--line);
      font-size: 26px;
    }
    @media (max-width: 560px) {
      body { font-size: 20px; }
      main { width: min(100% - 32px, 570px); padding-top: 58px; }
      .links { gap: 24px; font-size: 22px; }
      .affiliation { font-size: 21px; }
      .agent a { font-size: 23px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>张志凌</h1>
    <p class="en">Zhiling Zhang</p>

    <nav class="links" aria-label="links">
      <a href="https://scholar.google.com/citations?user=A_vVS4gAAAAJ">Scholar</a>
      <a href="https://github.com/zhilingz">GitHub</a>
    </nav>

    <a class="affiliation" href="https://www.bza.edu.cn/">北京中关村学院</a>
    <span class="affiliation">×</span>
    <a class="affiliation" href="https://www.ustc.edu.cn/">中国科学技术大学（博士联合培养）</a>

    <div class="agent">
      <small>Agent</small>
      <a href="/chat/">与张志凌对话 →</a>
    </div>
  </main>
</body>
</html>
