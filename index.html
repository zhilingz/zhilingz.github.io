<!doctype html>

<head>

<title>Zhiling Zhang</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", Arial, sans-serif;

    display: flex;

    align-items: center;
    justify-content: center;

  }
  .container {

    flex: 1;
    display: flex;
    flex-direction: column;

    justify-content: center;
  }
  .name-cn {

    font-size: 1.6rem;
    font-weight: 400;
    color: #111;
    letter-spacing: 0.2em;
  }
  .portrait {
    width: 96px;
    height: 96px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 1.3rem;
  }
  .name-en {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.2rem;

    letter-spacing: 0.04em;
  }
  .links {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
  }
  .links a {
    color: #bbb;
    text-decoration: none;
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.05em;

  }
  .links a:hover { color: #555; }
  .affiliation {
    margin-top: 1.6rem;
    font-size: 0.78rem;
    color: #bbb;
    letter-spacing: 0.03em;
  }
  .affiliation a {
    color: #bbb;
    text-decoration: none;
    border-bottom: 1px solid #e8e8e8;
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .affiliation a:hover {
    color: #666;
    border-color: #999;
  }
  .chat { margin-top: 2.8rem; }
  .chat a {
    color: #999;
    text-decoration: none;
    font-family: "Songti SC", "STSong", "SimSun", serif;
    font-size: 0.85rem;

    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .chat a:hover {
    color: #444;
    border-color: #999;
  }
  .chat ruby rt {
    font-size: 0.5em;
    color: #bbb;
    letter-spacing: 0.06em;
    font-weight: 400;
  }

<div class="container">
  <img class="portrait" id="portrait" src="image/0397AA94-D79F-4E3D-B793-C39C1106DC2A.PNG" alt="张志凌">

<script>
  const portraits = [
    "image/0397AA94-D79F-4E3D-B793-C39C1106DC2A.PNG",
    "image/4088C9E6-DFDB-4BC8-9B91-2A577787C73C.PNG"
  ];
  const portrait = document.getElementById("portrait");
  portrait.src = portraits[Math.floor(Math.random() * portraits.length)];
