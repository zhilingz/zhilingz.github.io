<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>与张志凌对话</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
    background: #fff;
    color: #222;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    padding: 2rem;
    width: min(680px, 100%);
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .name-cn {
    font-family: "Songti SC", "STSong", "SimSun", serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: #111;
    letter-spacing: 0.2em;
  }
  .name-en {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: #555;
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
  }
  .chat-title {
    margin-top: 1.8rem;
    color: #999;
    font-family: "Songti SC", "STSong", "SimSun", serif;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
  }
  .chat-title ruby rt {
    font-size: 0.5em;
    color: #bbb;
    letter-spacing: 0.06em;
    font-weight: 400;
  }
  .choices {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 2.2rem;
  }
  button {
    border: 0;
    background: transparent;
    color: #bbb;
    cursor: pointer;
    font: 0.8rem/1.4 -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  button:hover { color: #555; }
  .answer {
    width: min(520px, 100%);
    margin-top: 2.4rem;
    color: #777;
    font-size: 0.86rem;
    line-height: 1.9;
    letter-spacing: 0.02em;
    min-height: 6.8rem;
  }
  .answer.slide {
    animation: slideIn 0.36s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .home {
    margin-top: 2rem;
  }
  .home a {
    color: #bbb;
    text-decoration: none;
    border-bottom: 1px solid #e8e8e8;
    padding-bottom: 1px;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
  }
  .home a:hover {
    color: #666;
    border-color: #999;
  }
</style>
</head>
<body>
<div class="container">
  <div class="name-cn">张志凌</div>
  <div class="name-en">Zhiling Zhang</div>
  <div class="chat-title">与<ruby><strong>张志凌</strong><rt>Agent</rt></ruby>对话</div>
  <div class="choices" id="choices"></div>
  <div class="answer" id="answer">你好。我是张志凌的个人主页 Agent，可以回答教育经历、导师、研究方向和联系方式。</div>
  <div class="home"><a href="/">返回主页</a></div>
</div>
<script>
  const answers = {
    education: "张志凌目前为中国科学技术大学网络空间安全博士生，2025-2028 年博士联合培养。本科为中国科学技术大学信息安全专业，硕士为中国科学技术大学网络空间安全专业。",
    advisors: "博士阶段为北京中关村学院与中国科学技术大学联合培养，导师为何纪言和张卫明。硕士阶段导师为张卫明和周文柏。",
    research: "主要关注 AI security and privacy，包括人脸隐私保护、GUI Agent 隐私保护，以及面向 AI 图像编辑的鲁棒水印。",
    links: "Scholar: https://scholar.google.com/citations?user=A_vVS4gAAAAJ。GitHub: https://github.com/zhilingz。"
  };
  const labels = {
    education: "教育经历",
    advisors: "导师",
    research: "研究方向",
    links: "链接"
  };
  const choices = document.getElementById("choices");
  const answer = document.getElementById("answer");
  Object.keys(labels).forEach((key) => {
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = labels[key];
    button.addEventListener("click", () => {
      answer.classList.remove("slide");
      void answer.offsetWidth;
      answer.textContent = answers[key];
      answer.classList.add("slide");
    });
    choices.appendChild(button);
  });
</script>
</body>
</html>
