<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>与张志凌对话</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
    background: #fff;
    color: #222;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    width: min(720px, 100%);
    padding: 2rem;
  }
  .head {
    text-align: center;
    margin-bottom: 1.8rem;
  }
  .name-cn {
    font-family: "Songti SC", "STSong", "SimSun", serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: #111;
    letter-spacing: 0.2em;
  }
  .name-en {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1rem;
    font-weight: 400;
    color: #555;
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
  }
  .chat-title {
    margin-top: 1.1rem;
    color: #999;
    font-family: "Songti SC", "STSong", "SimSun", serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
  }
  .chat-title ruby rt {
    font-size: 0.5em;
    color: #bbb;
    letter-spacing: 0.06em;
    font-weight: 400;
  }
  .panel {
    border: 1px solid #f0f0f0;
    border-radius: 18px;
    padding: 1rem;
  }
  .messages {
    height: min(52vh, 440px);
    min-height: 320px;
    overflow-y: auto;
    padding: 0.4rem;
  }
  .message {
    width: fit-content;
    max-width: 82%;
    margin-bottom: 0.9rem;
    padding: 0.72rem 0.9rem;
    border-radius: 16px;
    font-size: 0.86rem;
    line-height: 1.75;
    color: #666;
    animation: slideIn 0.28s ease both;
  }
  .message.agent {
    background: #fafafa;
    border-top-left-radius: 4px;
  }
  .message.user {
    margin-left: auto;
    background: #f4f4f4;
    border-top-right-radius: 4px;
    color: #444;
  }
  .followups {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    padding: 0.2rem 0.4rem 0.9rem;
  }
  .followups button {
    border: 1px solid #eee;
    border-radius: 999px;
    background: #fff;
    color: #999;
    padding: 0.45rem 0.75rem;
    cursor: pointer;
    font: 0.76rem/1.4 -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
    transition: color 0.2s, border-color 0.2s;
  }
  .followups button:hover {
    color: #555;
    border-color: #ccc;
  }
  form {
    display: flex;
    gap: 0.7rem;
    border-top: 1px solid #f2f2f2;
    padding: 0.9rem 0.4rem 0;
  }
  input {
    flex: 1;
    min-width: 0;
    border: 0;
    outline: 0;
    color: #555;
    font: 0.86rem/1.5 -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
  }
  input::placeholder { color: #c8c8c8; }
  form button {
    border: 0;
    background: transparent;
    color: #999;
    cursor: pointer;
    font: 0.82rem/1.5 -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
    transition: color 0.2s;
  }
  form button:hover { color: #444; }
  .home {
    margin-top: 1.4rem;
    text-align: center;
  }
  .home a {
    color: #bbb;
    text-decoration: none;
    border-bottom: 1px solid #e8e8e8;
    padding-bottom: 1px;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
  }
  .home a:hover {
    color: #666;
    border-color: #999;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="head">
    <div class="name-cn">张志凌</div>
    <div class="name-en">Zhiling Zhang</div>
    <div class="chat-title">与<ruby><strong>张志凌</strong><rt>Agent</rt></ruby>对话</div>
  </div>
  <div class="panel">
    <div class="messages" id="messages" aria-live="polite">
      <div class="message agent">你好，我是张志凌^Agent。你想询问什么内容？</div>
    </div>
    <div class="followups" id="followups"></div>
    <form id="chat-form">
      <input id="user-input" autocomplete="off" placeholder="自由输入暂不支持，请点击上方推荐问题">
      <button type="submit">发送</button>
    </form>
  </div>
  <div class="home"><a href="/">返回主页</a></div>
</div>
<script>
  const nodes = {
    entry: {
      text: "你想询问什么内容？",
      options: [
        ["教育经历", "education"],
        ["研究方向", "research"],
        ["兴趣爱好", "hobbies"],
        ["联培项目", "joint"],
        ["联系方式", "contact"]
      ]
    },
    research: {
      text: "我的研究方向是 AI 安全与隐私。",
      detail: "具体包括人脸隐私保护、GUI Agent 隐私保护，以及面向 AI 图像编辑的鲁棒水印。",
      options: [
        ["人脸隐私保护", "facePrivacy"],
        ["GUI Agent 隐私保护", "guiPrivacy"],
        ["鲁棒水印", "watermark"]
      ]
    },
    facePrivacy: {
      text: "人脸隐私保护研究通过微小扰动降低人脸数据被未授权训练的风险。",
      detail: "我的 Segue 工作关注真实场景中的效率、迁移性和鲁棒性。"
    },
    guiPrivacy: {
      text: "GUI Agent 隐私保护关注屏幕交互中的敏感信息泄露。",
      detail: "GUIGuard-Bench 用轨迹和截图评估隐私识别、防护与任务执行之间的权衡。"
    },
    watermark: {
      text: "鲁棒水印研究关注图像经过大模型编辑后仍能保留版权标记。",
      detail: "这个方向用于版权保护和恶意篡改溯源。"
    },
    education: {
      text: "我目前是中国科学技术大学网络空间安全博士生。",
      detail: "本科是中国科学技术大学信息安全专业，硕士是中国科学技术大学网络空间安全专业。",
      options: [
        ["本科经历", "undergraduate"],
        ["硕士经历", "master"],
        ["博士经历", "phd"],
        ["导师信息", "advisors"]
      ]
    },
    undergraduate: {
      text: "本科阶段我在中国科学技术大学学习信息安全。",
      detail: "时间是 2018-2022，GPA 为 3.93 / 4.3。"
    },
    master: {
      text: "硕士阶段我在中国科学技术大学学习网络空间安全。",
      detail: "时间是 2022-2025，导师为张卫明和周文柏。"
    },
    phd: {
      text: "博士阶段我在中国科学技术大学攻读网络空间安全。",
      detail: "时间是 2025-2028，为北京中关村学院联合培养。"
    },
    advisors: {
      text: "博士阶段导师为何纪言和张卫明。",
      detail: "硕士阶段导师为张卫明和周文柏。"
    },
    joint: {
      text: "我的博士是北京中关村学院 × 中国科学技术大学联合培养。",
      detail: "学院导师为何纪言，学校导师为张卫明。"
    },
    contact: {
      text: "可以通过邮箱 784405268@qq.com 联系我。",
      detail: "也可以访问 GitHub https://github.com/zhilingz 或 Google Scholar https://scholar.google.com/citations?user=A_vVS4gAAAAJ。"
    },
    hobbies: {
      text: "兴趣爱好暂未添加公开信息。",
      detail: "我先只展示资料中可核对的教育、研究、联培和联系方式。"
    },
    unsupported: {
      text: "暂不支持自由输入。",
      detail: "请点击推荐问题继续了解。"
    }
  };
  const initialOptions = nodes.entry.options;
  const answeredNodes = new Set();
  const messages = document.getElementById("messages");
  const followups = document.getElementById("followups");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("user-input");

  function addMessage(text, type) {
    const node = document.createElement("div");
    node.className = `message ${type}`;
    node.textContent = text;
    messages.appendChild(node);
    messages.scrollTop = messages.scrollHeight;
  }

  function renderFollowups(items) {
    followups.innerHTML = "";
    items.filter(([, target]) => target === "entry" || !answeredNodes.has(target)).forEach(([text, target]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = text;
      button.addEventListener("click", () => choose(text, target));
      followups.appendChild(button);
    });
  }

  function choose(label, target) {
    addMessage(label, "user");
    showNode(target);
  }

  function showNode(id) {
    renderFollowups([]);
    input.disabled = true;
    const node = nodes[id] || nodes.unsupported;
    if (id !== "entry" && id !== "unsupported") answeredNodes.add(id);
    const waiting = document.createElement("div");
    waiting.className = "message agent";
    waiting.textContent = "正在思考...";
    messages.appendChild(waiting);
    messages.scrollTop = messages.scrollHeight;

    setTimeout(() => {
      waiting.textContent = node.text;
      const options = node.options || initialOptions;
      renderFollowups(options);
      input.disabled = false;
      input.focus();
    }, 160);
  }

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    const query = input.value.trim();
    if (query) {
      choose(query, "unsupported");
    }
    input.value = "";
  });

  renderFollowups(initialOptions);
</script>
</body>
</html>
